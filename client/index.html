<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/baatchit-icon.svg" />
    <link rel="apple-touch-icon" href="/baatchit-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="BaatChit - Modern real-time messaging platform" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Allow camera and microphone for WebRTC calls -->
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*, display-capture=*" />
    <title>BaatChit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Set --app-height to the real visible viewport height.
      // This is the only reliable fix for mobile keyboard pushing content off-screen.
      function setAppHeight() {
        document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
      }
      setAppHeight();
      window.addEventListener('resize', setAppHeight);
      window.addEventListener('orientationchange', function() {
        setTimeout(setAppHeight, 100);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
