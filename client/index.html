<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BaatChit" />
    <!-- Enable full screen on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Disable text selection on iOS web app -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Prevent search engines from indexing if needed -->
    <meta name="robots" content="index, follow" />
    <!-- Optimization for Microsoft Edge on Windows Phone -->
    <meta name="msapplication-TileColor" content="#7c3aed" />
    <!-- Allow camera and microphone for WebRTC calls -->
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*, display-capture=*" />
    <!-- Enable fullscreen on Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Ensure proper rendering on all devices -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Force color mode preference -->
    <meta name="supported-color-schemes" content="light dark" />
    
    <link rel="icon" type="image/svg+xml" href="/baatchit-icon.svg" />
    <link rel="apple-touch-icon" href="/baatchit-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="description" content="BaatChit - Modern real-time messaging platform" />
    <title>BaatChit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Set --app-height to the real visible viewport height.
      // visualViewport tracks mobile browser chrome and the on-screen keyboard.
      function setAppHeight() {
        var viewport = window.visualViewport;
        var height = viewport && viewport.height ? viewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', height + 'px');
      }
      setAppHeight();
      window.addEventListener('resize', setAppHeight);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppHeight);
        window.visualViewport.addEventListener('scroll', setAppHeight);
      }
      window.addEventListener('orientationchange', function() {
        setTimeout(setAppHeight, 100);
      });
      window.addEventListener('focusin', function() {
        setTimeout(setAppHeight, 60);
      });
      window.addEventListener('focusout', function() {
        setTimeout(setAppHeight, 120);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
