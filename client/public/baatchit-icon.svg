<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black circle background -->
  <circle cx="50" cy="50" r="50" fill="#000000"/>
  <!-- White border ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Globe outline (simplified) -->
  <circle cx="50" cy="44" r="26" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- Globe latitude lines -->
  <ellipse cx="50" cy="44" rx="26" ry="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <ellipse cx="50" cy="44" rx="26" ry="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- Globe vertical line -->
  <line x1="50" y1="18" x2="50" y2="70" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <!-- Chat bubble dots (representing the globe made of chat bubbles) -->
  <circle cx="36" cy="36" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="44" cy="30" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="54" cy="28" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="63" cy="33" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="68" cy="42" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="65" cy="52" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="56" cy="58" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="44" cy="57" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="35" cy="50" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="32" cy="42" r="2.5" fill="#ffffff" opacity="0.9"/>
  <!-- Small chat bubble icon in center -->
  <rect x="43" y="39" width="14" height="10" rx="3" fill="#ffffff"/>
  <polygon points="46,49 44,53 50,49" fill="#ffffff"/>
  <circle cx="47" cy="44" r="1.2" fill="#000000"/>
  <circle cx="50" cy="44" r="1.2" fill="#000000"/>
  <circle cx="53" cy="44" r="1.2" fill="#000000"/>
  <!-- "bc" text at bottom -->
  <text x="50" y="82" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">baatchit</text>
</svg>
